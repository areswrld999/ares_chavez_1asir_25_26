<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //PROGRAMA PRINCIPAL
        let tabla_notas=[2,3,4,5,6,5,7,8,3,9]
        resul = proceso(tabla_notas)
        visualizar (resul)

        //PROCESO
        function proceso (tab_notas){
            let conta = 0, suma = 0
            for(i=0;i< tab_notas.length;i++){
                if(tab_notas[i] >= 5){
                    conta++;
                    suma += tab_notas[i]
                }
                media = suma / conta;
                return media;

            }
        };



        function visualizar (dato){
            alert("notas aprobadas: "+ dato)
        }
    </script>
</body>
</html>
