<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        
        let tab_notas = [3,5,2,8,7]
        visualizar(tab_notas)

        function visualizar (tab_notas){
            let sw = 0, i = 0
            while (sw == 0){
                if (i == tab_notas.length){
                    sw = 1
                }
                else {
                    if (tab_notas[i] >= 5){
                        alert (tab_notas[i])
                    }
                    i++;
                }
            }
        }
    </script>
</body>
</html>
