<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>


//Programa principal

var edad = parseInt(prompt("Dame tu edad"))
Visualizar (Proceso(edad))


//proceso

function Proceso (edad){
    if (edad >= 18){
        resultado = "si"
    }
    else {
        resultado = "No"
    }
    return(resultado)
};

function Visualizar(resultado){
    document.write(resultado)
}


    </script>
</body>
</html>
