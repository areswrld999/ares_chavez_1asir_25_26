<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let mes = parseInt(prompt("Ingrese numero de mes"))
        visualizar (proceso(mes))

        function proceso(mes){
            if (mes > 0 && mes <= 2 || mes == 12){
                return "Es invierno"
            }
            else if (mes >= 3 && mes <= 5){
                return "Es primavera"
            }
            else if (mes >= 6 && mes <= 9){
                return "Es Verano"
            }
            else if (mes == 10 && mes == 11){
                return "Es otoño"
            }
        };


        function visualizar (resul){
            document.write(resul)
        };
    </script>
</body>
</html>
