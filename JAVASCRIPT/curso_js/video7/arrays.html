<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Usando Arrays</title>
<link rel="stylesheet" href="css/micss.css">
<script>

let articulos = ["zapatillas","camiseta","pantalon","calcetines"]
//let articulos = new Array("zapatillas","camiseta","pantalon","calcetines")
//let articulos = []

</script>
</head>

<body>
<div class="contenedor">
  <div class="header">
    <p class="logo">JavaScript Arrays <i class="mm">Píldoras Informáticas
      </p>
  </div>
  <div class="contenido">
    <div class="principal">
      <h1>Manejando Arrays</h1>
      <script>

        document.write("<p>El primer articulo es <strong>" );
        document.write(articulos[1] + "</strong><p>");
        document.write("<p> el ultimo elemento es <strong>");
        document.write(articulos[articulos.length-1] + "</strong><p>")//esto sirve para mostrarnos el ultimo elemento del array por si no sabemos que numero es el ultimo
        articulos.unshift("balon");//esto agrega este nuevo elemento al principio del array
        document.write("<p>nos olvidamos de agregamos este elemento: ");
        document.write(articulos[0] + "</p>");
        document.write("<p>Agregamos un nuevo elemento al final: ")
        articulos.push(prompt("Introduce el articulo que quieres agregar:"))
        document.write (articulos[articulos.length-1])
        document.write("<p>" + articulos [0] + "<br/>")
        document.write(articulos[1] + "<br/>")
        document.write(articulos[2] + "<br/>")
        document.write(articulos[3] + "<br/>")
        document.write(articulos[4] + "<br/>")
        document.write(articulos[5] + "<br/></p>")
        alert("Borraremos el primer elemento")
        articulos.shift() //Sirve para borrar el primer elemento
        document.write("<p>" + articulos [0] + "<br/>")
        document.write(articulos[1] + "<br/>")
        document.write(articulos[2] + "<br/>")
        document.write(articulos[3] + "<br/>")
        document.write(articulos[4] + "<br/>")
        alert("borraremos el ultimo elemento")
        articulos.pop()//Sirve para eliminar el ultimo elemento del array
        document.write("<p>" + articulos [0] + "<br/>")
        document.write(articulos[1] + "<br/>")
        document.write(articulos[2] + "<br/>")
        document.write(articulos[3] + "<br/>")

		
		
      </script>
  </div>
  </div>
  
</div>
</body>
</html>
