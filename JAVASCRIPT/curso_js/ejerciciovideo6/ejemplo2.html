<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jugando con variables</title>
<link rel="stylesheet" href="css/micss2.css">

</head>

<body>
<div class="contenedor">
<div class="header">
	<p class="logo">Curso JavaScript Píldoras Informáticas</p>
</div>
<div class="contenido">
	<div class="principal">
<h1>Jugando con las variables</h1>

<script>

	var nombre=prompt("Intruduce tu nombre"); // El Prompt nos crea un cuadro para introducir datos y almacenarlos como podria ser dato de la variable nombre
	var apellido= prompt("Introduce tu apellido");
	var edad = prompt("Introduce tu edad")
	var restando = prompt("¿Cuantos años te quieres quitar?")

	edad -= restando

	document.write("<p>");
	document.write(nombre + " " + apellido + " y tu edad es: " + edad);
	document.write("</p>");



</script>

</div>
</div>

</div>
</body>
</html>
